<!DOCTYPE html>
<html lang="es-PE">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Página no encontrada | Corporación Puerta Grande E.I.R.L.</title>
  <style>
    :root {
      --bg: #10153d;
      --surface: #1b2366;
      --accent: #f28526;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.72);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(242, 133, 38, 0.18), transparent 28%),
        radial-gradient(circle at top left, rgba(95, 110, 222, 0.22), transparent 28%),
        linear-gradient(180deg, #10153d, #1b2366);
    }

    .card {
      width: min(640px, 100%);
      padding: 36px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 24px 60px rgba(9, 13, 36, 0.28);
      text-align: center;
    }

    img {
      width: 96px;
      height: auto;
      margin: 0 auto 18px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.05;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 26px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 22px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
    }

    .button--solid {
      background: linear-gradient(135deg, #f28526, #ff9835);
      color: #10153d;
    }

    .button--ghost {
      border: 1px solid rgba(255, 255, 255, 0.16);
      color: #ffffff;
    }
  </style>
</head>
<body>
  <main class="card">
    <img src="assets/logo-cpg.svg" alt="Logo de Corporación Puerta Grande E.I.R.L.">
    <h1>Página no encontrada</h1>
    <p>La ruta que intentaste abrir no existe o fue movida. Puedes volver al inicio o escribirnos por WhatsApp para recibir atención directa.</p>
    <div class="actions">
      <a class="button button--solid" href="/laboratorio-suelos-web/">Ir al inicio</a>
      <a class="button button--ghost" href="https://wa.me/51920493433" target="_blank" rel="noreferrer">WhatsApp</a>
    </div>
  </main>
</body>
</html>
